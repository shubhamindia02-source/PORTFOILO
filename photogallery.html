<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    body {
        background: #131313;
        color:whitesmoke ;
        font-family: Helvetica, sans-serif;
        align-items: center;
    }

    .navbar {
        background: #292929;
        width: 800px;
        height: 80px;
        margin: 30px auto;
        box-shadow: 0px 3px 10px rgb(131, 129, 129);
        text-align: center;
        border-radius: 20px;

    }

    h2 {
        padding-top: 15px;
        font-size: 50px;
    }



    img {
        width: 250px;
        border-radius: 20px;
        border: 2px solid whitesmoke;
        box-shadow: 0px 3px 10px rgb(131, 129, 129);
      
        margin-left: 260px;

        margin-top: 100px;
        transition: 0.4s ease 



    }

    img:hover {
        transform: scale(1.1);
        box-shadow: 0px 3px 10px rgb(255, 158, 1);


    }
</style>

<body>
    <header>
        <nav class="navbar">
            <h2>Photo Gallery</h2>
        </nav>
    </header>
    <main>

        <a href="pic1.html"><img src="image/1.jpg" alt="pic1"></a>
        <img src="image/2.jpg" alt="pic2">
        <img src="image/3.jpg" alt="pic3">
        <img src="image/4.jpg" alt="pic4">
        <img src="image/5.jpg" alt="pi5">
        <img src="image/6.jpg" alt="pic6">
        <img src="image/7.jpg" alt="pic7">
        <img src="image/8.jpg" alt="pic7">
        <img src="image/9.jpg" alt="pic9">

    </main>

</body>

</html>
