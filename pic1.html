<style>

    *{
        margin: 0;
        padding: 0;
    }
    body {
        background: #131313;
        color: #ffffff;
        font-family: Helvetica, sans-serif;
        align-items: center;
    }
    .navbar {
        background: #292929;
        width: 800px;
        height: 80px;
        margin: 30px auto;
        box-shadow: 0px 3px 10px rgb(131, 129, 129);
        text-align: center;
        border-radius: 20px;
        font-size: 60px;
        font-weight: 800;

    }

    img{
       margin-top:150px ;
       margin-left: 40%;
       width: 350px;
        border-radius: 20px;
        border: 2px solid whitesmoke;
        box-shadow: 0px 3px 10px rgb(131, 129, 129);
        animation: popover-open 0.5s ease-in-out;
    }

    @keyframes popover-open {
        from{transform:scale(0) ;}
        to{transform: scale(1.3) ;}

        

        
    }

    
</style>
