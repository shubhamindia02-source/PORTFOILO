<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>nav bar

    </title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
</head>

<style>
    *{
       padding: 0;
        margin: 0;
    }
    body{
        min-height: 100vh;
        background: #210303;

    }
    nav{
        background: white;
        box-shadow: 3px 3px 5px rgba(227, 13, 13, 0.592);
    }
    nav ul{
        width: 100%;
        list-style: none;
        display: flex;
         justify-content: flex-end;    
         align-items: center;
    }
    nav li{
        height: 50px;


    }
    a{
        height: 100%;
        padding: 0 30px;
        text-decoration: none;
        display: flex;
        align-items: center;
        color: black;

    }
    nav a:hover{
        background: rgba(82, 82, 82, 0.539);
    }
    .sidebar{
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        width: 250px;
        background: white;
        box-shadow: -10px 0 10px rgba(255, 255, 255, 0.151);
        display: none;
        flex-direction:column ;
        align-items: flex-start;
        justify-content: flex-start;

    }
    .sidebar li{
        width: 100%;
    }
    .sidebar a{
        width:100% ;
         
    }

.material-symbols-outlined {
  font-variation-settings:
  'FILL' 0,
  'wght' 400,
  'GRAD' 0,
  'opsz' 24;
  margin: 14px;
  
  
}



</style>
    



</style>
<body>
    <nav>
        <ul class="sidebar">
        <li><a href="#">Home</a></li>
        <li><a href="#">about</a></li>
        <li><a href="#">Work</a></li>
        <li><a href="#">contact</a></li>

        </ul><ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">about</a></li>
        <li><a href="#">Work</a></li>
        <li><a href="#">contact</a></li>
        <li>menu</li>

        </ul>
    </nav>
    
</body>
</html>
