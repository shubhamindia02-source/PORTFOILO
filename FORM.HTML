<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN FORM</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }

    body{
         background: #131313;
        color: whitesmoke;
        font-family: Helvetica, sans-serif;
    }
    .container{
        width: 500px;
        height: 300px;
        background:whitesmoke;
        border-radius: 20px;
        color: rgb(12, 0, 0);
        font-size: 20px;
        margin: 100px auto;
        padding: 20px;
        box-shadow: 0px 5px 10px #16c01059;
        
    }

    h2{
        text-align: center;
        color: #16c010;
    }
    label{
        font-size: 15px;
        margin-top: 20PX;
    }
    input{
        width: 90%;
       padding: 10PX;
        border-radius: 5px;
      margin-top: 7px;
      border: 1px solid #ccc;
          
    }
    
    button{
        width: 40%;
        margin-left: 25PX;
        margin-top: 20PX;
        height: 30PX;
        font-size: 16PX;
        border: 1px solid #818080;
        border-radius: 10PX;
    }
    button:hover{
        background-color: #16c010;
    }
    .sem:hover{
        background: #ff0000bc;
    }


   

</style>
<body>
    <main class="container">
        
    <form >
        <h2>Log In</h2>
        <tr class="row1">
            <td>
            <label for="name">Name</label>
            <input type="text" placeholder="Enter you Name" required ></td>   
        </tr>
        <tr class="ro2">
            <td>
            <label for="Email">Email Id</label><input type="text" placeholder="Enter you Emial Id" required ></td>   
        </tr>
        </tr>
        <tr class="row3">
            <td>
            <label for="Password">Password</label><input type="text" placeholder="Enter you Password" required ></td>   
        </tr>
        </tr>
        <button  type="submit">Submit</button>
       
        <button class="sem" type="reset">Reset

        </button>
        
    </form>    
    </main>
    
</body>
</html>
