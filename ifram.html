<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
</head>
<style>
     * {
        margin: 0;
        padding: 0;
    }

    body {
        background: #131313;
        color: whitesmoke;
        font-family: Helvetica, sans-serif;
    }
        .navbar {
        background: #292929;
        width: 800px;
        height: 80px;
        margin: 30px auto;
        box-shadow: 0px 3px 10px rgb(131, 129, 129);
        text-align: center;
        border-radius: 20px;
        font-size: 60px;
        font-weight: 800;
        padding: 10px;

    }

    .youtube{
         background: #292929;
        width: 80%;
        height: 60px;
        font-size: 50px;
        padding: 5px;
        font-weight: 600;
         margin: 100px auto;
          box-shadow: 0px 3px 10px rgb(131, 129, 129);
        text-align: center;
        border-radius: 20px;

    }
    .frame{
        display: flex;
        justify-content: space-around;
    }
    iframe{
        background: #292929;
        width: 40%;
        height: 432px;
       margin-left: 20px;        
          box-shadow: 0px 3px 10px rgb(131, 129, 129);
        border-radius: 20px;
    }
    .hr1 {
        border: 0;
        background: #e9e8ed;
        height: 1.2px;
        margin: 0px 84px;
        margin-top: 70px;
        opacity: 40%;
    }

    
    .lastdiv{
        display: flex;
        justify-content: space-around;
        margin-top: -60px;

       
       
   }
    
   .lastdiv a{
      background: #292929;
        width: 15%;
        height: 50px;
        font-size: 40px;
        padding: 5px;
        font-weight:300;
         margin: 50px auto;
          box-shadow: 0px 3px 10px rgb(131, 129, 129);
        text-align: center;
        border-radius: 20px;
        text-decoration: none;
        color:  whitesmoke;;
        
        
    }
   

</style>
<body>
    <main>
            <nav class="navbar">
            Iframe
        </nav>
            <div class="row1">

                 <iframe width="560" height="315" src="https://www.youtube.com/embed/ZgcIwHoLGKE?si=k-00KsXO3lWAchMX" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

                 <iframe width="560" height="315" src="https://www.youtube.com/embed/nDjloeIB3Pc?si=rV0UUcgFaxuCduzH" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                
                
                </div>
                </div>

           <iframe src="https://www.wikipedia.org/" frameborder="0"></iframe>
                
                </div>
                </div>

                    <a href="image/video1.mp4" target="targetlink">video1</a>
